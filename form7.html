<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>출산휴가 신청서</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background: #d8d8d8;
            padding: 20px 0 40px;
            color: #1a1a1a;
        }

        .no-print-area {
            width: 210mm;
            margin: 0 auto 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 9px 18px;
            background-color: #ffffff;
            color: #555;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #ccc;
            transition: all 0.2s ease;
        }
        .back-btn:hover { background-color: #ff6b00; color: #fff; border-color: #ff6b00; }
        .back-btn::before { content: '←'; margin-right: 8px; }

        .pdf-btn {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .pdf-btn:hover { background: #333; }

        .page {
            width: 210mm;
            height: 297mm;
            margin: 0 auto;
            background: #fff;
            /* 푸터 공간 확보를 위해 하단 패딩을 45mm로 설정 */
            padding: 10mm 15mm 45mm; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            position: relative; /* 푸터 고정의 기준점 */
        }

        .doc-meta { font-size: 10px; color: #888; margin-bottom: 4px; }
        .doc-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .approval-container {
            border-bottom: 2.5px solid #1a1a1a;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .approval-area {
            display: flex;
            justify-content: flex-end;
        }
        .approval-table { border-collapse: collapse; width: auto; }
        .approval-table th, .approval-table td {
            border: 1px solid #1a1a1a;
            width: 80px !important;
            height: 22px !important;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            padding: 0;
        }
        .approval-table td.sign-cell { height: 60px !important; }

        .sec-title {
            font-size: 12px;
            font-weight: 700;
            color: #1a1a1a;
            margin: 12px 0 6px;
            padding-bottom: 4px;
            border-bottom: 1.5px solid #1a1a1a;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sec-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: #1a1a1a;
        }

        .content-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .content-table th, .content-table td {
            border: 1px solid #d0d0d0;
            padding: 8px 12px;
            vertical-align: middle;
        }
        .content-table th {
            background: #f5f5f5;
            font-weight: 600;
            color: #444;
            width: 140px;
            text-align: center;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            border: none;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            background: transparent;
        }

        .notice-blue { color: #007aff; font-size: 11px; margin-top: 4px; font-weight: 600; }
        .auto-fill { background: #fafafa; color: #888; font-weight: 500; text-align: center; font-size: 11px; }

        /* 화면과 인쇄 모두에서 푸터를 최하단에 고정 */
        .footer {
            position: absolute;
            bottom: 15mm;
            left: 15mm;
            right: 15mm;
            text-align: center;
        }

        .footer-date { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .sign-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 10px;
        }
        .sign-label { font-size: 13px; font-weight: 500; margin-right: 8px; }
        .sign-line {
            border-bottom: 1px solid #1a1a1a;
            width: 190px;
            display: flex;
            justify-content: center;
            margin-right: 8px;
        }
        .sign-line input {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            border: none;
            outline: none;
        }
        .footer-recipient { font-size: 14px; font-weight: 800; color: #1a1a1a; }

        @media print {
            body { background: none; padding: 0; }
            .no-print-area { display: none; }
            .page { 
                margin: 0; 
                box-shadow: none; 
                width: 210mm; 
                height: 297mm; 
                border: none; 
                padding: 10mm 15mm;
            }
            .footer {
                position: fixed; /* 인쇄 시 페이지마다 하단 고정 */
                bottom: 15mm;
                left: 15mm;
                right: 15mm;
            }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

<div class="no-print-area">
    <a href="index.html" class="back-btn">목록으로 돌아가기</a>
    <button class="pdf-btn" onclick="window.print()">🖨 PDF 저장 / 인쇄</button>
</div>

<div class="page">
    <div class="doc-meta">PLUSX Corp. — 복지지원서류</div>
    <div class="doc-title">출산휴가 신청서</div>

    <div class="approval-container">
        <div class="approval-area">
            <table class="approval-table">
                <tr><th>PM/조직장</th><th>대표이사</th><th>경영지원팀</th></tr>
                <tr><td class="sign-cell"></td><td class="sign-cell"></td><td class="sign-cell"></td></tr>
            </table>
        </div>
    </div>

    <div class="sec-title">작성자 인적사항</div>
    <table class="content-table">
        <tr>
            <th>소속</th>
            <td><input type="text" placeholder="소속 팀명 입력"></td>
            <th>성명</th>
            <td><input type="text" id="userName" placeholder="성명 입력" oninput="syncName()"></td>
        </tr>
    </table>

    <div class="sec-title">상세내역</div>
    <table class="content-table">
        <tr>
            <th>신청사유</th>
            <td colspan="3">
                <label><input type="radio" name="reason" value="self" onclick="toggleReason()" checked> 본인 출산휴가 (90일)</label>
                <label style="margin-left: 20px;"><input type="radio" name="reason" value="partner" onclick="toggleReason()"> 배우자 출산휴가 (20일)</label>
                <div id="guide_self" class="notice-blue">※ 미숙아, 다태아 출산의 경우 EX팀에 별도 문의</div>
                <div id="guide_partner" class="notice-blue" style="display:none;">※ 120일 이내 고지 후 사용</div>
            </td>
        </tr>
        <tr id="split_row" style="display:none;">
            <th>분할사용 여부</th>
            <td colspan="3">
                <select id="split_type" onchange="toggleReason()" style="width: 200px; border: 1px solid #ddd;">
                    <option value="0">분할하지 않음</option>
                    <option value="1">1회 분할사용</option>
                    <option value="2">2회 분할사용</option>
                    <option value="3">3회 분할사용</option>
                </select>
            </td>
        </tr>
    </table>

    <div id="date_input_container"></div>

    <table class="content-table">
        <tr>
            <th>비고</th>
            <td><input type="text" placeholder="자유 기재"></td>
        </tr>
        <tr>
            <th>첨부서류</th>
            <td>임신, 출산 확인서(주수 표기) 또는 병원진단서 1부</td>
        </tr>
    </table>

    <div class="footer">
        <div class="footer-date" id="todayDate"></div>
        <div class="sign-row">
            <span class="sign-label">신청자 :</span>
            <div class="sign-line">
                <input type="text" id="displayName" placeholder="이름 입력">
            </div>
            <span class="sign-label">(인)</span>
        </div>
        <div class="footer-recipient">플러스엑스 주식회사 대표이사 귀하</div>
    </div>
</div>

<script>
    function syncName() {
        document.getElementById('displayName').value = document.getElementById('userName').value;
    }

    function handleDateInput(el) {
        let v = el.value.replace(/[^0-9]/g, '');
        if (v.length > 8) v = v.slice(0, 8);
        if (v.length === 8) {
            el.value = v.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
            calcDates(); 
        } else {
            el.value = v; 
        }
    }

    function toggleReason() {
        const reason = document.querySelector('input[name="reason"]:checked').value;
        const splitRow = document.getElementById('split_row');
        const guideSelf = document.getElementById('guide_self');
        const guidePartner = document.getElementById('guide_partner');
        const container = document.getElementById('date_input_container');
        container.innerHTML = '';

        if (reason === 'self') {
            splitRow.style.display = 'none';
            guideSelf.style.display = 'block';
            guidePartner.style.display = 'none';
            container.innerHTML = `
                <table class="content-table">
                    <tr>
                        <th>휴가 시작일</th>
                        <td><input type="text" id="start_0" placeholder="YYYYMMDD" oninput="handleDateInput(this)"></td>
                        <th>휴가 종료일</th>
                        <td class="auto-fill" id="end_0">[시작일 기입 시 자동반영]</td>
                    </tr>
                </table>`;
        } else {
            splitRow.style.display = 'table-row';
            guideSelf.style.display = 'none';
            guidePartner.style.display = 'block';
            const splitCount = parseInt(document.getElementById('split_type').value);
            let html = '<table class="content-table">';
            for (let i = 0; i <= splitCount; i++) {
                html += `
                    <tr>
                        <th>${i+1}회차 시작일</th>
                        <td><input type="text" id="start_${i}" placeholder="YYYYMMDD" oninput="handleDateInput(this)"></td>
                        <th>사용일수 / 종료일</th>
                        <td>
                            <input type="number" id="days_${i}" value="${splitCount === 0 ? 20 : ''}" min="1" max="20" style="width:40px; border-bottom:1px solid #ddd;" oninput="validateTotalDays(this); calcDates();"> 일 / 
                            <span id="end_${i}" style="font-weight:700; color:#007aff; margin-left:5px; font-size:11px;">[자동반영]</span>
                        </td>
                    </tr>`;
            }
            html += '</table>';
            container.innerHTML = html;
        }
    }

    function validateTotalDays(inputEl) {
        const splitCount = parseInt(document.getElementById('split_type').value);
        let total = 0;
        for (let i = 0; i <= splitCount; i++) {
            const val = parseInt(document.getElementById(`days_${i}`).value) || 0;
            total += val;
        }
        if (total > 20) {
            alert("배우자 출산 휴가는 총 20일을 초과할 수 없습니다.");
            inputEl.value = "";
            calcDates();
        }
    }

    function calcDates() {
        const reason = document.querySelector('input[name="reason"]:checked').value;
        if (reason === 'self') {
            const startVal = document.getElementById('start_0').value;
            if (startVal.length === 10) { 
                let end = new Date(startVal);
                if(!isNaN(end)) {
                    end.setDate(end.getDate() + 89);
                    document.getElementById('end_0').textContent = formatDate(end);
                    document.getElementById('end_0').style.color = "#007aff";
                    document.getElementById('end_0').style.fontSize = "13px";
                }
            } else {
                document.getElementById('end_0').textContent = "[시작일 기입 시 자동반영]";
                document.getElementById('end_0').style.color = "#888";
            }
        } else {
            const splitCount = parseInt(document.getElementById('split_type').value);
            for (let i = 0; i <= splitCount; i++) {
                const startVal = document.getElementById(`start_${i}`).value;
                const daysVal = document.getElementById(`days_${i}`).value;
                const target = document.getElementById(`end_${i}`);
                if (startVal.length === 10 && daysVal) {
                    let end = new Date(startVal);
                    if(!isNaN(end)) {
                        let count = 1;
                        while (count < parseInt(daysVal)) {
                            end.setDate(end.getDate() + 1);
                            if (end.getDay() !== 0 && end.getDay() !== 6) count++;
                        }
                        target.textContent = formatDate(end);
                        target.style.fontSize = "13px";
                    }
                } else {
                    target.textContent = "[자동반영]";
                    target.style.fontSize = "11px";
                }
            }
        }
    }

    function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    (function() {
        const t = new Date();
        document.getElementById('todayDate').textContent = `${t.getFullYear()}년 ${String(t.getMonth() + 1).padStart(2, '0')}월 ${String(t.getDate()).padStart(2, '0')}일`;
        toggleReason();
    })();
</script>
</body>
</html>
